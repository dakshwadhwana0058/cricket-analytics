<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Scorer & Analytics</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CricketPro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5351/5351486.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #020617;
            --surface: #1e293b;
            --accent: #22c55e; /* Turf Green */
            --neon: #38bdf8;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #064e3b, transparent);
            background-attachment: fixed;
            color: #f8fafc; 
            min-height: 100vh;
        }

        nav { 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo { font-weight: 900; letter-spacing: 1px; font-size: 0.8rem; text-transform: uppercase; color: var(--neon); }
        .logo span { color: #fff; }

        .banner { 
            background: linear-gradient(135deg, var(--accent), #10b981); 
            color: #000; padding: 20px; text-align: center; font-weight: 900; 
            cursor: pointer; margin: 15px; border-radius: 20px; 
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            text-transform: uppercase;
        }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }

        #manager { 
            display: none; 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(15px);
            padding: 25px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }

        .score { font-size: 5.5rem; font-weight: 900; color: var(--gold); text-align: center; text-shadow: 0 0 30px rgba(251, 191, 36, 0.3); line-height: 1; margin: 10px 0; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; font-size: 1rem; text-align: center; outline: none;
        }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .btn { 
            border: none; padding: 22px 5px; border-radius: 18px; font-weight: 900; 
            cursor: pointer; font-size: 1.2rem; transition: all 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .b-extra { background: #334155; color: #94a3b8; }
        .b-dot { background: #475569; color: white; }
        .b-run { background: var(--neon); color: #020617; }
        .b-4 { background: var(--accent); color: #020617; }
        .b-6 { background: #a855f7; color: white; }
        .b-out { background: #ef4444; color: white; grid-column: span 3; }

        .chase { 
            background: rgba(251, 191, 36, 0.1); 
            border: 1px solid var(--gold); 
            padding: 15px; border-radius: 15px; margin-bottom: 20px; 
            text-align: center; color: var(--gold); font-weight: 800; 
        }

        .voice-toggle {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: bold;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .card h3 { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .card p { font-size: 2.2rem; font-weight: 900; color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CRICKET <span>SCORER & ANALYTICS</span></div>
        <button class="voice-toggle" id="voiceBtn" onclick="toggleVoice()">🔊 VOICE: ON</button>
    </nav>

    <div class="banner" onclick="toggle()">🏏 START LIVE MATCH</div>

    <div class="container">
        <section id="manager">
            <div class="grid-inputs">
                <input type="number" id="targ" placeholder="TARGET" oninput="upd()">
                <input type="number" id="ovr" placeholder="OVERS" oninput="upd()">
            </div>
            
            <div id="msg" class="chase" style="display:none"></div>
            <div class="score" id="scr">0-0</div>
            <p style="text-align:center; color:#94a3b8; font-weight:bold; margin-bottom:20px; letter-spacing: 4px;">OVERS: <span id="ov">0.0</span></p>

            <div class="controls">
                <button class="btn b-extra" onclick="extra('Wide')">WIDE</button>
                <button class="btn b-extra" onclick="extra('No Ball')">N.B</button>
                <button class="btn b-dot" onclick="run(0, 'Dot ball')">DOT</button>
                
                <button class="btn b-run" onclick="run(1, 'One run')">+1</button>
                <button class="btn b-4" onclick="run(4, 'Four! Great shot')">4</button>
                <button class="btn b-6" onclick="run(6, 'Six! That is huge')">6</button>
                
                <button class="btn b-out" onclick="out()">WICKET</button>
                <button class="btn" style="grid-column:span 3; background:none; color:#64748b; font-size:0.7rem; box-shadow:none; margin-top:15px;" onclick="res()">RESET MATCH</button>
            </div>
        </section>

        <div class="stats-grid">
            <div class="card"><h3>Average</h3><p>38.4</p></div>
            <div class="card"><h3>Strike Rate</h3><p>142.1</p></div>
        </div>
    </div>

    <script>
        let r=0, w=0, b=0, done=false, voiceEnabled=true;

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            document.getElementById('voiceBtn').innerText = voiceEnabled ? "🔊 VOICE: ON" : "🔈 VOICE: OFF";
        }

        function speak(text) {
            if (!voiceEnabled) return;
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function toggle() { 
            let s=document.getElementById('manager').style; 
            s.display=(s.display=='block')?'none':'block'; 
            if(s.display=='block') speak("Live scorer activated");
        }

        function run(n, comment) { 
            r+=n; b++; upd(); 
            speak(comment + ". Score is " + r + " for " + w);
        }

        function extra(type) { 
            r+=1; upd(); 
            speak(type + ". One extra run. Score is " + r);
        }

        function out() { 
            if(w<10)w++; b++; upd(); 
            speak("Wicket! Out. Score is " + r + " for " + w);
        }

        function upd() {
            document.getElementById('scr').innerText = r+"-"+w;
            document.getElementById('ov').innerText = Math.floor(b/6)+"."+(b%6);
            let t=parseInt(document.getElementById('targ').value), o=parseInt(document.getElementById('ovr').value), m=document.getElementById('msg');
            if(t>0 && o>0) {
                m.style.display='block'; let bl=(o*6)-b, rn=t-r;
                if(rn<=0) { 
                    m.innerText="🏆 TARGET ACHIEVED!"; 
                    m.style.background="var(--accent)"; m.style.color="#000";
                    if(!done){ confetti(); speak("Target achieved! Incredible win!"); done=true; }
                } else if(bl<=0 || w>=10) { 
                    m.innerText="🏁 MATCH OVER"; 
                    m.style.background="#ef4444"; m.style.color="white";
                } else { 
                    m.innerHTML=`${rn} needed in ${bl} balls`;
                    m.style.color="var(--gold)"; m.style.background="rgba(251,191,36,0.1)";
                }
            } else { m.style.display='none'; }
        }

        function res() { 
            if(confirm("Reset match data?")){ 
                r=0; w=0; b=0; done=false; 
                document.getElementById('targ').value=''; 
                document.getElementById('ovr').value=''; 
                upd(); speak("Match reset");
            } 
        }
    </script>
</body>
</html>
