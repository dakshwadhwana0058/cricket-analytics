<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Analytics & Turf Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #38bdf8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #f1f5f9; color: var(--text-main); }

        nav {
            background: var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .match-day-banner {
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            color: white; padding: 15px; text-align: center; font-weight: bold;
            cursor: pointer; margin: 10px; border-radius: 12px;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Turf Manager Section */
        #turf-manager {
            display: none;
            background: var(--primary);
            color: white; padding: 20px; border-radius: 20px; margin-bottom: 25px;
        }

        .score-display { font-size: 4rem; font-weight: 900; color: #fbbf24; text-align: center; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 0.9rem; }
        
        .turf-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .turf-btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-blue { background: var(--accent); color: var(--primary); }
        .btn-red { background: #ef4444; color: white; grid-column: span 2; }

        /* Chasing Logic Box */
        .chase-box {
            background: rgba(251, 191, 36, 0.1);
            border: 1px dashed #fbbf24;
            padding: 15px; border-radius: 12px; margin-top: 15px;
            text-align: center; color: #fbbf24; font-weight: 700;
        }

        /* Analytics Section */
        .section-title { font-size: 1.1rem; font-weight: 700; margin: 20px 0 10px; text-transform: uppercase; color: #64748b; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card p { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CRICKET<span>LAB</span></div>
    </nav>

    <div class="match-day-banner" onclick="toggleTurf()">
        ⚡ LIVE MATCH SCORER MODE
    </div>

    <div class="container">
        
        <section id="turf-manager">
            <div class="setup-grid">
                <div>
                    <label style="font-size: 0.7rem; color: #94a3b8;">MATCH OVERS</label>
                    <input type="number" id="match-overs" placeholder="Ex: 6" oninput="updateScorer()">
                </div>
                <div>
                    <label style="font-size: 0.7rem; color: #94a3b8;">TARGET SCORE</label>
                    <input type="number" id="target-input" placeholder="Ex: 50" oninput="updateScorer()">
                </div>
            </div>
            
            <div class="score-display" id="main-score">0 - 0</div>
            <p style="text-align: center; color: #94a3b8;">Overs: <span id="overs">0.0</span></p>

            <div id="chase-logic" class="chase-box" style="display: none;">
                <span id="runs-needed">0</span> runs needed in <span id="balls-left">0</span> balls
            </div>

            <div class="turf-controls">
                <button class="turf-btn btn-blue" onclick="add(1)">+1</button>
                <button class="turf-btn btn-blue" onclick="add(4)">4</button>
                <button class="turf-btn btn-blue" onclick="add(6)">6</button>
                <button class="turf-btn btn-red" onclick="wicket()">WICKET</button>
                <button class="turf-btn" style="background: #444; color: white;" onclick="resetMatch()">RESET</button>
            </div>
        </section>

        <h2 class="section-title">Career Analytics</h2>
        <div class="stats-grid">
            <div class="stat-card"><h3>Batting Avg</h3><p>38.4</p></div>
            <div class="stat-card"><h3>Strike Rate</h3><p>142.1</p></div>
        </div>

    </div>

    <script>
        let runs = 0, wickets = 0, balls = 0;

        function toggleTurf() {
            const section = document.getElementById('turf-manager');
            section.style.display = (section.style.display === 'block') ? 'none' : 'block';
        }

        function add(r) { runs += r; balls++; updateScorer(); }
        function wicket() { if(wickets < 10) wickets++; balls++; updateScorer(); }

        function updateScorer() {
            // Basic Score
            document.getElementById('main-score').innerText = runs + " - " + wickets;
            document.getElementById('overs').innerText = Math.floor(balls/6) + "." + (balls%6);
            
            // Chase Logic
            let target = parseInt(document.getElementById('target-input').value);
            let totalOvers = parseInt(document.getElementById('match-overs').value);
            let chaseBox = document.getElementById('chase-logic');

            if (target > 0 && totalOvers > 0) {
                chaseBox.style.display = 'block';
                
                let totalBallsInMatch = totalOvers * 6;
                let ballsRemaining = totalBallsInMatch - balls;
                let runsNeeded = target - runs;

                document.getElementById('runs-needed').innerText = runsNeeded;
                document.getElementById('balls-left').innerText = ballsRemaining;

                // Color change if it gets tight
                if (runsNeeded > ballsRemaining) {
                    chaseBox.style.color = "#ef4444"; // Red if target is hard
                } else {
                    chaseBox.style.color = "#fbbf24"; // Yellow otherwise
                }
            } else {
                chaseBox.style.display = 'none';
            }
        }

        function resetMatch() {
            if(confirm("Reset live match?")) {
                runs = 0; wickets = 0; balls = 0;
                document.getElementById('target-input').value = '';
                document.getElementById('match-overs').value = '';
                updateScorer();
            }
        }
    </script>
</body>
</html>
