<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL 2026 Live Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --gold: #fbbf24; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 90px; }

        header { padding: 15px; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .live-tag { background: var(--red); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* COUNTDOWN STYLE */
        .countdown { font-size: 2rem; font-weight: 900; color: var(--gold); margin: 15px 0; letter-spacing: 2px; }
        .match-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 5px; }
        
        /* LIVE SCORE ENGINE STYLE */
        #live-engine { display: none; } /* Hidden until match starts */
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .team-box { flex: 1; }
        .team-name { font-size: 1.1rem; font-weight: 900; }
        .score-val { font-size: 1.8rem; font-weight: 900; color: var(--accent); }
        .overs { font-size: 0.8rem; color: #64748b; }

        /* BALL BY BALL DOTS */
        .over-history { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .ball { width: 30px; height: 30px; background: #1e293b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 900; }
        .six { background: #a855f7; color: white; }
        .four { background: var(--accent); color: #000; }
        .wicket { background: var(--red); color: white; }

        /* MENU BAR */
        .menu-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(20px); height: 65px; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .menu-item { color: #64748b; font-size: 0.65rem; font-weight: 800; text-align: center; }
        .active { color: var(--accent); }
    </style>
</head>

</div>
