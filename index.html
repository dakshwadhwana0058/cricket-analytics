<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>IPL Master Analytics</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020617; --surface: #1e293b; --accent: #22c55e; --neon: #38bdf8; --gold: #fbbf24; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #f8fafc; min-height: 100vh; padding-bottom: 50px; }

        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 0.9rem; color: var(--neon); text-transform: uppercase; }
        .logo span { color: #fff; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }

        /* SCORER INTERFACE */
        .score-display { text-align: center; margin: 20px 0; }
        .main-score { font-size: 5rem; font-weight: 900; color: var(--gold); line-height: 1; }
        .overs-display { color: #94a3b8; font-size: 1.2rem; margin-top: 10px; font-weight: 700; }

        .control-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .section-label { grid-column: span 4; font-size: 0.7rem; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 5px; }

        .btn { border: none; padding: 15px 5px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn:active { transform: scale(0.92); }

        /* Scoring Colors */
        .b-runs { background: var(--neon); color: #000; }
        .b-boundary { background: var(--accent); color: #000; }
        .b-extra { background: #64748b; color: white; }
        .b-out { background: var(--red); color: white; grid-column: span 4; padding: 20px; font-size: 1.2rem; }

        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">IPL MASTER <span>ANALYTICS</span></div>
        <div id="vStatus" style="font-size: 0.7rem; color: var(--accent);">● LIVE FEED</div>
    </nav>

    <div class="container">
        
        <div class="card">
            <div class="grid-inputs" style="display: flex; gap: 10px;">
                <input type="number" id="targ" placeholder="TARGET">
                <input type="number" id="ovr" placeholder="MAX OVERS">
            </div>

            <div class="score-display">
                <div class="main-score" id="scr">0-0</div>
                <div class="overs-display">OVERS: <span id="ov">0.0</span></div>
            </div>

            <div class="control-group">
                <div class="section-label">Scoring</div>
                <button class="btn b-runs" onclick="addRun(0)">0</button>
                <button class="btn b-runs" onclick="addRun(1)">1</button>
                <button class="btn b-runs" onclick="addRun(2)">2</button>
                <button class="btn b-runs" onclick="addRun(3)">3</button>
                <button class="btn b-boundary" onclick="addRun(4)" style="grid-column: span 2;">4 (FOUR)</button>
                <button class="btn b-boundary" onclick="addRun(6)" style="grid-column: span 2; background: #a855f7; color: white;">6 (SIX)</button>
            </div>

            <div class="control-group">
                <div class="section-label">Extras & Special</div>
                <button class="btn b-extra" onclick="addExtra('wd')">WD</button>
                <button class="btn b-extra" onclick="addExtra('nb')">NB</button>
                <button class="btn b-extra" onclick="addExtra('lb')">LB</button>
                <button class="btn b-extra" onclick="addExtra('b')">B</button>
            </div>

            <div class="control-group">
                <button class="btn b-out" onclick="takeWicket()">WICKET (OUT)</button>
            </div>

            <button onclick="resetAll()" style="width:100%; background:none; border:none; color:#475569; font-size:0.7rem; cursor:pointer;">RESET MATCH DATA</button>
        </div>

    </div>

    <script>
        let runs = 0, wickets = 0, balls = 0;

        function updateDisplay() {
            document.getElementById('scr').innerText = `${runs}-${wickets}`;
            const overNum = Math.floor(balls / 6);
            const ballNum = balls % 6;
            document.getElementById('ov').innerText = `${overNum}.${ballNum}`;
        }

        function addRun(r) {
            runs += r;
            balls++;
            updateDisplay();
            checkTarget();
        }

        function addExtra(type) {
            if (type === 'wd' || type === 'nb') {
                runs += 1; // 1 run for the extra, ball not counted
            } else {
                // Leg Byes or Byes count as balls
                runs += 1; 
                balls++;
            }
            updateDisplay();
        }

        function takeWicket() {
            if (wickets < 10) {
                wickets++;
                balls++;
                updateDisplay();
            }
            if (wickets === 10) alert("All Out!");
        }

        function checkTarget() {
            const target = parseInt(document.getElementById('targ').value);
            if (target && runs >= target) {
                confetti();
                alert("Match Won!");
            }
        }

        function resetAll() {
            if(confirm("Start new match?")) {
                runs = 0; wickets = 0; balls = 0;
                updateDisplay();
            }
        }
    </script>
</body>
</html>
