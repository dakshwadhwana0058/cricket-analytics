<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL Master Analytics | RCB vs LSG</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020617; --surface: #1e293b; --accent: #22c55e; --neon: #38bdf8; --gold: #fbbf24; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #f8fafc; min-height: 100vh; padding-bottom: 30px; }

        /* HEADER */
        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 0.9rem; color: var(--neon); text-transform: uppercase; }
        .logo span { color: #fff; }

        /* CONTAINER */
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* SCORE DISPLAYS */
        .score-display { text-align: center; margin: 10px 0 25px 0; }
        .main-score { font-size: 5rem; font-weight: 900; color: var(--gold); line-height: 1; letter-spacing: -2px; }
        .overs-display { color: #94a3b8; font-size: 1.2rem; margin-top: 10px; font-weight: 700; }

        /* CONTROLS */
        .control-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
        .section-label { grid-column: span 4; font-size: 0.7rem; text-transform: uppercase; color: #64748b; letter-spacing: 1.5px; margin-bottom: 5px; font-weight: 700; }

        .btn { border: none; padding: 18px 5px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 1rem; color: #000; }
        .btn:active { transform: scale(0.92); }
        
        .b-runs { background: var(--neon); }
        .b-boundary { background: var(--accent); }
        .b-extra { background: #475569; color: white; font-size: 0.8rem; }
        .b-out { background: var(--red); color: white; grid-column: span 4; padding: 20px; font-size: 1.2rem; margin-top: 5px; }

        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; text-align: center; font-weight: 700; font-size: 1rem; }
        ::placeholder { color: #475569; }

        /* MONETIZATION: UPI BUTTON */
        .support-container { margin-top: 25px; text-align: center; }
        .support-link { display: inline-block; width: 100%; background: linear-gradient(135deg, #059669, #10b981); color: white; text-decoration: none; padding: 18px; border-radius: 16px; font-weight: 900; font-size: 1rem; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); transition: 0.3s; }
        .support-link:active { transform: scale(0.96); }
        .support-note { font-size: 0.7rem; color: #64748b; margin-top: 10px; display: block; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">IPL MASTER <span>ANALYTICS</span></div>
        <div style="font-size: 0.7rem; color: var(--accent); font-weight: 800;">● LIVE RCB v LSG</div>
    </nav>

    <div class="container">
        
        <div class="card">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="number" id="targ" placeholder="TARGET RUNS">
                <input type="number" id="ovr" placeholder="OVERS LIMIT">
            </div>

            <div class="score-display">
                <div class="main-score" id="scr">0-0</div>
                <div class="overs-display">OVERS: <span id="ov">0.0</span></div>
            </div>

            <div class="control-group">
                <div class="section-label">Runs</div>
                <button class="btn b-runs" onclick="addRun(0)">0</button>
                <button class="btn b-runs" onclick="addRun(1)">1</button>
                <button class="btn b-runs" onclick="addRun(2)">2</button>
                <button class="btn b-runs" onclick="addRun(3)">3</button>
                <button class="btn b-boundary" onclick="addRun(4)" style="grid-column: span 2;">4 (FOUR)</button>
                <button class="btn b-boundary" onclick="addRun(6)" style="grid-column: span 2; background: #a855f7; color: white;">6 (SIX)</button>
            </div>

            <div class="control-group">
                <div class="section-label">Extras</div>
                <button class="btn b-extra" onclick="addExtra('wd')">WIDE</button>
                <button class="btn b-extra" onclick="addExtra('nb')">NO BALL</button>
                <button class="btn b-extra" onclick="addExtra('lb')">LEG BYE</button>
                <button class="btn b-extra" onclick="addExtra('b')">BYE</button>
            </div>

            <div class="control-group">
                <button class="btn b-out" onclick="takeWicket()">WICKET (OUT)</button>
            </div>

            <div class="support-container">
                <a href="upi://pay?pa=dakkwadhwana15@okaxis&pn=IPL%20Scorer%20Dev&cu=INR&tn=Support%20Cricket%20Project" class="support-link">
                    ☕ BUY ME A CHAI (TIP ₹20)
                </a>
                <span class="support-note">Secure Payment via GPay, PhonePe, Paytm</span>
            </div>

            <button onclick="resetAll()" style="width:100%; background:none; border:none; color:#475569; font-size:0.7rem; cursor:pointer; margin-top: 25px; text-decoration: underline;">RESET MATCH</button>
        </div>

    </div>

    <script>
        let runs = 0, wickets = 0, balls = 0;

        function updateDisplay() {
            document.getElementById('scr').innerText = `${runs}-${wickets}`;
            const overNum = Math.floor(balls / 6);
            const ballNum = balls % 6;
            document.getElementById('ov').innerText = `${overNum}.${ballNum}`;
        }

        function addRun(r) {
            runs += r;
            balls++;
            updateDisplay();
            checkVictory();
        }

        function addExtra(type) {
            if (type === 'wd' || type === 'nb') {
                runs += 1; // 1 run for the extra, ball not counted
            } else {
                runs += 1; 
                balls++; // Leg Byes count as balls
            }
            updateDisplay();
            checkVictory();
        }

        function takeWicket() {
            if (wickets < 10) {
                wickets++;
                balls++;
                updateDisplay();
            }
            if (wickets === 10) alert("Team All Out!");
        }

        function checkVictory() {
            const target = parseInt(document.getElementById('targ').value);
            if (target && runs >= target) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => alert("Victory! Target Achieved."), 500);
            }
        }

        function resetAll() {
            if(confirm("Are you sure you want to reset the scorecard?")) {
                runs = 0; wickets = 0; balls = 0;
                updateDisplay();
            }
        }
    </script>
</body>
</html>
