<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Lab | Turf Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #38bdf8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #f1f5f9; color: var(--text-main); overflow-x: hidden; }

        nav {
            background: var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .match-day-banner {
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            color: white; padding: 15px; text-align: center; font-weight: bold;
            cursor: pointer; margin: 10px; border-radius: 12px;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Turf Manager */
        #turf-manager {
            display: none;
            background: var(--primary);
            color: white; padding: 20px; border-radius: 24px; margin-bottom: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .score-display { font-size: 4.5rem; font-weight: 900; color: #fbbf24; text-align: center; line-height: 1; margin: 10px 0; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
            background: #1e293b; color: white; font-size: 0.9rem; outline: none;
        }

        .turf-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .turf-btn { border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.1rem; transition: 0.1s; }
        .turf-btn:active { transform: scale(0.9); }
        
        .btn-blue { background: var(--accent); color: var(--primary); }
        .btn-green { background: #22c55e; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-dot { background: #475569; color: white; } /* Dot ball color */
        .btn-red { background: #ef4444; color: white; grid-column: span 2; }

        .chase-box {
            background: rgba(251, 191, 36, 0.1);
            border: 2px dashed #fbbf24;
            padding: 15px; border-radius: 15px; margin-top: 20px;
            text-align: center; color: #fbbf24; font-weight: 700;
        }

        /* Analytics Section */
        .section-title { font-size: 1rem; font-weight: 800; margin: 25px 0 12px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card p { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">CRICKET<span>LAB</span></div>
        <div style="font-size: 0.7rem; opacity: 0.6;">PRO EDITION</div>
    </nav>

    <div class="match-day-banner" onclick="toggleTurf()">
        🏏 START LIVE TURF SCORING
    </div>

    <div class="container">
        
        <section id="turf-manager">
            <div class="setup-grid">
                <div>
                    <label style="font-size: 0.65rem; color: #94a3b8; display: block; margin-bottom: 4px;">TARGET</label>
                    <input type="number" id="target-input" placeholder="Score" oninput="updateScorer()">
                </div>
                <div>
                    <label style="font-size: 0.65rem; color: #94a3b8; display: block; margin-bottom: 4px;">TOTAL OVERS</label>
                    <input type="number" id="match-overs" placeholder="Overs" oninput="updateScorer()">
                </div>
            </div>
            
            <div class="score-display" id="main-score">0 - 0</div>
            <p style="text-align: center; color: #94a3b8; font-weight: bold; letter-spacing: 2px;">OVERS: <span id="overs">0.0</span></p>

            <div id="chase-logic" class="chase-box" style="display: none;">
                <span id="chase-text"><span id="runs-needed">0</span> runs needed in <span id="balls-left">0</span> balls</span>
            </div>

            <div class="turf-controls">
                <button class="turf-btn btn-dot" onclick="add(0)">DOT</button>
                <button class="turf-btn btn-blue" onclick="add(1)">+1</button>
                <button class="turf-btn btn-green" onclick="add(4)">4</button>
                <button class="turf-btn btn-purple" onclick="add(6)">6</button>
                <button class="turf-btn btn-red" onclick="wicket()">WICKET</button>
                <button class="turf-btn" style="background: #1e293b; color: #94a3b8; grid-column: span 3; padding: 10px; font-size: 0.8rem; margin-top: 10px;" onclick="resetMatch()">RESET MATCH</button>
            </div>
        </section>

        <h2 class="section-title">Performance Stats</h2>
        <div class="stats-grid">
            <div class="stat-card"><h3>Avg</h3><p>38.4</p></div>
            <div class="stat-card"><h3>S/R</h3><p>142.1</p></div>
        </div>
    </div>

    <script>
        let runs = 0, wickets = 0, balls = 0;
        let celebrated = false;

        function toggleTurf() {
            const section = document.getElementById('turf-manager');
            section.style.display = (section.style.display === 'block') ? 'none' : 'block';
        }

        function add(r) { runs += r; balls++; updateScorer(); }
        function wicket() { if(wickets < 10) wickets++; balls++; updateScorer(); }

        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#38bdf8', '#fbbf24', '#22c55e']
            });
        }

        function updateScorer() {
            document.getElementById('main-score').innerText = runs + " - " + wickets;
            document.getElementById('overs').innerText = Math.floor(balls/6) + "." + (balls%6);
            
            let target = parseInt(document.getElementById('target-input').value);
            let totalOvers = parseInt(document.getElementById('match-overs').value);
            let chaseBox = document.getElementById('chase-logic');

            if (target > 0 && totalOvers > 0) {
                chaseBox.style.display = 'block';
                let totalBallsInMatch = totalOvers * 6;
                let ballsRemaining = totalBallsInMatch - balls;
                let runsNeeded = target - runs;

                if (runsNeeded <= 0) {
                    document.getElementById('chase-text').innerText = "🏆 TARGET ACHIEVED!";
                    chaseBox.style.background = "#22c55e";
                    chaseBox.style.color = "white";
                    if (!celebrated) { celebrate(); celebrated = true; }
                } else if (ballsRemaining <= 0 || wickets >= 10) {
                    document.getElementById('chase-text').innerText = "🏁 MATCH OVER";
                    chaseBox.style.background = "#ef4444";
                    chaseBox.style.color = "white";
                } else {
                    document.getElementById('chase-text').innerHTML = `${runsNeeded} needed in ${ballsRemaining} balls`;
                    chaseBox.style.background = "rgba(251, 191, 36, 0.1)";
                    chaseBox.style.color = (runsNeeded > ballsRemaining) ? "#ef4444" : "#fbbf24";
                }
            } else {
                chaseBox.style.display = 'none';
            }
        }

        function resetMatch() {
            if(confirm("Reset match?")) {
                runs = 0; wickets = 0; balls = 0; celebrated = false;
                document.getElementById('target-input').value = '';
                document.getElementById('match-overs').value = '';
                updateScorer();
            }
        }
    </script>
</body>
</html>
