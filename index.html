<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL 2026 Analyst Pro | RCB Winner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; --dark: #020617; --card: #0f172a; --accent: #10b981; --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--dark); color: #f8fafc; }

        header { padding: 20px; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid #1e293b; text-align: center; }
        .tag { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        .match-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid #1e293b; margin-bottom: 20px; position: relative; overflow: hidden; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .team-name { font-size: 1.4rem; font-weight: 900; }
        .score-val { font-size: 1.5rem; font-weight: 900; color: #fff; }
        
        .result-strip { background: rgba(16, 185, 129, 0.1); padding: 12px; border-radius: 12px; text-align: center; font-size: 0.85rem; color: var(--accent); font-weight: 800; border: 1px solid var(--accent); }

        .next-match { background: #1e293b; border-radius: 20px; padding: 15px; margin-top: 20px; border: 1px solid #334155; }
        .pay-btn { background: var(--gold); color: #000; display: block; text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: 900; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.7rem; font-weight: 800; color: #94a3b8;">IPL 2026 • MATCH 23 RESULT</div>
    <div style="font-size: 1.3rem; font-weight: 900;">RCB <span style="color: var(--primary);">vs</span> LSG</div>
</header>

<div class="container">
    
    <div class="match-card">
        <span class="tag">Finished</span>
        
        <div class="score-row">
            <span class="team-name">LSG</span>
            <span class="score-val">146 (20)</span>
        </div>

        <div class="score-row">
            <span class="team-name" style="color: var(--primary);">RCB</span>
            <span class="score-val">149/5 (15.1)</span>
        </div>

        <div class="result-strip">
            RCB won by 5 wickets (29 balls left)
        </div>
    </div>

    <div class="next-match">
        <div style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase;">Next Match: Tomorrow 7:30 PM</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <span style="font-weight: 800; font-size: 1.1rem;">MI vs PBKS ⚡</span>
            <span style="font-size: 0.7rem; background: #334155; padding: 4px 8px; border-radius: 5px;">Wankhede</span>
        </div>
        <p style="font-size: 0.75rem; color: #cbd5e1; margin-top: 8px;">Will MI bounce back at home? Get the pitch report and playing 11 analysis.</p>
        
        <a href="upi://pay?pa=dakkwadhwana15@okaxis&pn=IPLAnalyst&am=10&cu=INR" class="pay-btn">
            PREDICT MI vs PBKS (₹10)
        </a>
    </div>

</div>

</body>
</html>
