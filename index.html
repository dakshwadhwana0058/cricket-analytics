<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Analytics | Turf Scorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLING --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #f0f4f8; 
            color: #1a202c;
            line-height: 1.5;
        }

        nav {
            background: #0f172a;
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 900;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 20px 0 10px 0;
            color: #334155;
            text-transform: uppercase;
        }

        /* Scoreboard Card */
        .scoreboard-card {
            background: #0f172a;
            color: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .score-display {
            font-size: 4.5rem;
            font-weight: 900;
            color: #fbbf24;
            line-height: 1;
        }

        .overs-display {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        /* Buttons */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
        }

        button:active { transform: scale(0.95); }

        .btn-run { background: #38bdf8; color: #0f172a; }
        .btn-boundary { background: #22c55e; }
        .btn-six { background: #8b5cf6; }
        .btn-out { background: #ef4444; }
        .btn-reset { background: #64748b; }

        /* KPI Section */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .kpi-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .kpi-card h4 { font-size: 0.8rem; color: #64748b; }
        .kpi-card p { font-size: 1.2rem; font-weight: 700; }

        footer { text-align: center; padding: 30px; color: #94a3b8; font-size: 0.8rem; }

    </style>
</head>
<body>

    <nav>CRICKET ANALYTICS</nav>

    <main class="container">
        
        <h2 class="section-title">Live Turf Scorer</h2>
        
        <div class="scoreboard-card">
            <div class="score-display" id="main-score">0 - 0</div>
            <div class="overs-display">Overs: <span id="overs-count">0.0</span></div>
            
            <div class="grid-3">
                <button class="btn-run" onclick="addBall(1)">+1</button>
                <button class="btn-boundary" onclick="addBall(4)">4</button>
                <button class="btn-six" onclick="addBall(6)">6</button>
            </div>

            <div class="grid-2">
                <button class="btn-out" onclick="takeWicket()">WICKET</button>
                <button class="btn-reset" onclick="resetMatch()">RESET</button>
            </div>
        </div>

        <h2 class="section-title">Match KPI</h2>
        <div class="kpi-grid">
            <div class="kpi-card">
                <h4>Run Rate</h4>
                <p id="run-rate">0.00</p>
            </div>
            <div class="kpi-card">
                <h4>Projection</h4>
                <p id="projection">0</p>
            </div>
        </div>

    </main>

    <footer>
        &copy; 2026 Cricket Analytics Dashboard<br>
        Designed for Turf Matches
    </footer>

    <script>
        let runs = 0;
        let wickets = 0;
        let totalBalls = 0;

        function addBall(amt) {
            runs += amt;
            totalBalls += 1;
            updateDisplay();
        }

        function takeWicket() {
            if (wickets < 10) {
                wickets++;
                totalBalls += 1;
                updateDisplay();
            } else {
                alert("Team is All Out!");
            }
        }

        function resetMatch() {
            if (confirm("Reset the match?")) {
                runs = 0;
                wickets = 0;
                totalBalls = 0;
                updateDisplay();
            }
        }

        function updateDisplay() {
            // Calculate Overs (e.g., 7 balls = 1.1 overs)
            let completedOvers = Math.floor(totalBalls / 6);
            let remainingBalls = totalBalls % 6;
            let overStr = completedOvers + "." + remainingBalls;
            
            // Calculate Run Rate
            let rr = totalBalls > 0 ? (runs / (totalBalls / 6)).toFixed(2) : "0.00";
            
            // Calculate Projection (assuming 20 over match)
            let proj = totalBalls > 0 ? Math.round((runs / totalBalls) * 120) : "0";

            // Update UI
            document.getElementById('main-score').innerText = runs + " - " + wickets;
            document.getElementById('overs-count').innerText = overStr;
            document.getElementById('run-rate').innerText = rr;
            document.getElementById('projection').innerText = proj;
        }
    </script>

</body>
</html>
