<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Scorer & Analytics</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5351/5351486.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f1f5f9; color: #1e293b; overflow-x: hidden; touch-action: manipulation; }

        nav { background: var(--primary); padding: 15px; display: flex; justify-content: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; letter-spacing: 1px; font-size: 0.9rem; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .banner { background: linear-gradient(90deg, #38bdf8, #8b5cf6); color: white; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; margin: 12px; border-radius: 15px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }

        .container { padding: 12px; max-width: 500px; margin: 0 auto; }

        #manager { display: none; background: var(--primary); color: white; padding: 20px; border-radius: 24px; margin-bottom: 25px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .score { font-size: 4.5rem; font-weight: 900; color: #fbbf24; text-align: center; line-height: 1; margin: 10px 0; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 1rem; text-align: center; outline: none; }

        /* Button Grid Layout */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { border: none; padding: 18px 5px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 1.1rem; transition: 0.1s; }
        .btn:active { transform: scale(0.92); filter: brightness(1.2); }
        
        .b-extra { background: #64748b; color: white; } /* For Wide/No Ball */
        .b-dot { background: #475569; color: white; }
        .b-run { background: var(--accent); color: var(--primary); }
        .b-4 { background: #22c55e; color: white; }
        .b-6 { background: #8b5cf6; color: white; }
        .b-out { background: #ef4444; color: white; grid-column: span 3; }

        .chase { background: rgba(251, 191, 36, 0.1); border: 2px dashed #fbbf24; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; color: #fbbf24; font-weight: 800; }

        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-top: 10px; }
        .card h3 { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .card p { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <nav><div class="logo">CRICKET <span>SCORER & ANALYTICS</span></div></nav>

    <div class="banner" onclick="toggle()">🏏 OPEN MATCH SCORER</div>

    <div class="container">
        <section id="manager">
            <div class="grid-inputs">
                <input type="number" id="targ" placeholder="Target" oninput="upd()">
                <input type="number" id="ovr" placeholder="Overs" oninput="upd()">
            </div>
            
            <div id="msg" class="chase" style="display:none"></div>
            <div class="score" id="scr">0-0</div>
            <p style="text-align:center; color:#94a3b8; font-weight:bold; margin-bottom:15px; letter-spacing: 2px;">OVERS: <span id="ov">0.0</span></p>

            <div class="controls">
                <button class="btn b-extra" onclick="extra()">WIDE</button>
                <button class="btn b-extra" onclick="extra()">N.B</button>
                <button class="btn b-dot" onclick="run(0)">DOT</button>
                
                <button class="btn b-run" onclick="run(1)">+1</button>
                <button class="btn b-4" onclick="run(4)">4</button>
                <button class="btn b-6" onclick="run(6)">6</button>
                
                <button class="btn b-out" onclick="out()">WICKET</button>
                
                <button class="btn" style="grid-column:span 3; background:none; color:#ef4444; font-size:0.75rem; margin-top:10px;" onclick="res()">RESET MATCH</button>
            </div>
        </section>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <div class="card"><h3>Average</h3><p>38.4</p></div>
            <div class="card"><h3>S/R</h3><p>142.1</p></div>
        </div>
    </div>

    <script>
        let r=0, w=0, b=0, done=false;
        function toggle() { let s=document.getElementById('manager').style; s.display=(s.display=='block')?'none':'block'; }
        
        // Legal Ball function
        function run(n) { r+=n; b++; upd(); }
        
        // Extra function (No ball added to over)
        function extra() { r+=1; upd(); }
        
        function out() { if(w<10)w++; b++; upd(); }

        function upd() {
            document.getElementById('scr').innerText = r+"-"+w;
            document.getElementById('ov').innerText = Math.floor(b/6)+"."+(b%6);
            let t=parseInt(document.getElementById('targ').value), o=parseInt(document.getElementById('ovr').value), m=document.getElementById('msg');
            if(t>0 && o>0) {
                m.style.display='block'; let bl=(o*6)-b, rn=t-r;
                if(rn<=0) { m.innerText="🏆 TARGET ACHIEVED!"; m.style.background="#22c55e"; m.style.color="white"; if(!done){confetti();done=true;} }
                else if(bl<=0 || w>=10) { m.innerText="🏁 MATCH OVER"; m.style.background="#ef4444"; m.style.color="white"; }
                else { m.innerHTML=`${rn} needed in ${bl} balls`; m.style.background="rgba(251,191,36,0.1)"; m.style.color=(rn>bl)?"#ef4444":"#fbbf24"; }
            } else { m.style.display='none'; }
        }

        function res() { if(confirm("Reset match?")){ r=0; w=0; b=0; done=false; document.getElementById('targ').value=''; document.getElementById('ovr').value=''; upd(); } }
    </script>
</body>
</html>
