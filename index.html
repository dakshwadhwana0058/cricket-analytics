<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Lab | Pro Turf App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cricket Lab">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5351/5351486.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #38bdf8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f1f5f9; color: var(--text-main); overflow-x: hidden; }

        /* Navigation */
        nav {
            background: var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        /* Open App Banner */
        .match-day-banner {
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            color: white; padding: 18px; text-align: center; font-weight: 800;
            cursor: pointer; margin: 12px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Turf Manager Section */
        #turf-manager {
            display: none; /* Toggled by JS */
            background: var(--primary);
            color: white; padding: 25px; border-radius: 28px; margin-bottom: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .score-display { font-size: 5rem; font-weight: 900; color: #fbbf24; text-align: center; line-height: 1; margin: 15px 0; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; 
            background: #1e293b; color: white; font-size: 1rem; outline: none; text-align: center;
        }

        .turf-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .turf-btn { border: none; padding: 22px; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 1.3rem; transition: 0.1s; }
        .turf-btn:active { transform: scale(0.92); filter: brightness(1.2); }
        
        .btn-blue { background: var(--accent); color: var(--primary); }
        .btn-green { background: #22c55e; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-dot { background: #475569; color: white; }
        .btn-red { background: #ef4444; color: white; grid-column: span 2; }

        .chase-box {
            background: rgba(251, 191, 36, 0.1);
            border: 2px dashed #fbbf24;
            padding: 18px; border-radius: 18px; margin-top: 20px;
            text-align: center; color: #fbbf24; font-weight: 800; font-size: 1.1rem;
        }

        /* Dashboard Look */
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 25px 0 12px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card p { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

        footer { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CRICKET<span>LAB</span></div>
        <div style="font-size: 0.7rem; background: #334155; padding: 4px 8px; border-radius: 5px;">TURF APP</div>
    </nav>

    <div class="match-day-banner" onclick="toggleTurf()">
        ⚡ TAP TO START LIVE SCORING
    </div>

    <div class="container">
        
        <section id="turf-manager">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-weight: 90
