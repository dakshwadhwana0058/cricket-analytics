<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turf Match Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: white; padding: 15px; }

        /* Header & Team Toggle */
        .header { text-align: center; padding: 10px; border-bottom: 1px solid #334155; margin-bottom: 15px; }
        .team-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .team-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #334155; color: white; font-weight: bold; }
        .active-team { background: #38bdf8; color: #0f172a; }

        /* Inputs */
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }

        /* Main Scoreboard */
        .scoreboard { background: #1e293b; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        #team-label { color: #38bdf8; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; }
        #main-score { font-size: 4.5rem; font-weight: 800; color: #fbbf24; margin: 5px 0; }
        .stats-row { display: flex; justify-content: space-around; color: #94a3b8; font-weight: bold; }

        /* Target Section */
        .target-box { background: #334155; padding: 10px; border-radius: 10px; margin-top: 15px; font-size: 0.9rem; }
        #needed { color: #fbbf24; font-weight: bold; }

        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button.action { border: none; padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer; }
        .run { background: #38bdf8; color: #0f172a; }
        .out { background: #ef4444; grid-column: span 2; }
        .reset { background: #64748b; padding: 10px; font-size: 0.8rem; margin-top: 20px; width: 100%; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">TURF PRO DASHBOARD</div>

    <div class="team-toggle">
        <button id="btnA" class="team-btn active-team" onclick="setTeam('Team A')">Team A</button>
        <button id="btnB" class="team-btn" onclick="setTeam('Team B')">Team B</button>
    </div>

    <div class="input-group">
        <input type="text" id="p_name" placeholder="Batsman Name">
        <input type="number" id="target_val" placeholder="Target Score" oninput="updateTarget()">
    </div>

    <div class="scoreboard">
        <div id="team-label">Team A Batting</div>
        <h1 id="main-score">0 - 0</h1>
        <div class="stats-row">
            <span>OVERS: <span id="overs">0.0</span></span>
            <span>RR: <span id="rr">0.0</span></span>
        </div>

        <div class="target-box" id="target-display" style="display: none;">
            Need <span id="needed">0</span> runs to win
        </div>
    </div>

    <div class="btn-grid">
        <button class="action run" onclick="add(1)">+1</button>
        <button class="action run" onclick="add(4)">4</button>
        <button class="action run" onclick="add(6)">6</button>
        <button class="action out" onclick="wicket()">WICKET</button>
        <button class="action run" onclick="add(0)" style="background: #475569;">0</button>
    </div>

    <button class="reset" onclick="reset()">RESET MATCH</button>

    <script>
        let runs = 0, wickets = 0, balls = 0;
        let currentTeam = "Team A";

        function setTeam(name) {
            currentTeam = name;
            document.getElementById('team-label').innerText = name + " Batting";
            document.getElementById('btnA').classList.toggle('active-team', name === 'Team A');
            document.getElementById('btnB').classList.toggle('active-team', name === 'Team B');
        }

        function updateTarget() {
            let target = document.getElementById('target_val').value;
            let display = document.getElementById('target-display');
            if(target > 0) {
                display.style.display = "block";
                document.getElementById('needed').innerText = (target - runs);
            } else {
                display.style.display = "none";
            }
        }

        function update() {
            document.getElementById('main-score').innerText = runs + " - " + wickets;
            document.getElementById('overs').innerText = Math.floor(balls/6) + "." + (balls%6);
            let runrate = balls > 0 ? (runs / (balls / 6)).toFixed(1) : "0.0";
            document.getElementById('rr').innerText = runrate;
            updateTarget();
        }

        function add(r) { runs += r; balls++; update(); }
        function wicket() { if(wickets < 10) wickets++; balls++; update(); }
        
        function reset() {
            if(confirm("Start new match?")) {
                runs = 0; wickets = 0; balls = 0;
                document.getElementById('target_val').value = '';
                document.getElementById('p_name').value = '';
                update();
            }
        }
    </script>

</body>
</html>
