<!DOCTYPE html>
<html>
<head>
  <title>Cricket Analytics Pro</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#006400, #228B22);
    color: white;
    margin: 0;
    padding: 0;
  }

  h1 {
    padding: 15px;
    font-size: 22px;
  }

  .card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin: 15px auto;
    width: 90%;
    max-width: 350px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px black;
  }

  input {
    margin: 6px;
    padding: 10px;
    width: 90%;
    border-radius: 5px;
    border: none;
    font-size: 14px;
  }

  button {
    padding: 12px 25px;
    background: orange;
    color: black;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
    font-size: 16px;
  }

  #result {
    margin-top: 15px;
    white-space: pre-line;
    font-size: 16px;
    padding: 10px;
  }

  canvas {
    background: white;
    border-radius: 10px;
    margin-top: 15px;
    width: 90% !important;
    max-width: 350px;
  }

  /* 📱 MOBILE RESPONSIVE */
  @media (max-width: 600px) {
    h1 {
      font-size: 18px;
    }

    button {
      width: 80%;
    }
  }
</style>

</head>

<body>

  <h1>🏏 Cricket Analytics Pro</h1>

  <div class="card">
    <h3>Player 1</h3>
    <input type="text" id="name1" placeholder="Player Name">
    <input type="number" id="runs1" placeholder="Runs">
    <input type="number" id="balls1" placeholder="Balls">
  </div>

  <div class="card">
    <h3>Player 2</h3>
    <input type="text" id="name2" placeholder="Player Name">
    <input type="number" id="runs2" placeholder="Runs">
    <input type="number" id="balls2" placeholder="Balls">
  </div>

  <button onclick="compare()">Compare Players</button>

  <h2 id="result"></h2>

  <canvas id="chart" width="300" height="200"></canvas>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    let chart;

    function compare() {

      let name1 = document.getElementById("name1").value || "Player 1";
      let name2 = document.getElementById("name2").value || "Player 2";

      let r1 = document.getElementById("runs1").value;
      let b1 = document.getElementById("balls1").value;

      let r2 = document.getElementById("runs2").value;
      let b2 = document.getElementById("balls2").value;

      if (b1 == 0 || b2 == 0) {
        document.getElementById("result").innerText = "Balls cannot be 0";
        return;
      }

      let sr1 = (r1 / b1) * 100;
      let sr2 = (r2 / b2) * 100;

      let winner = "";

      if (sr1 > sr2) {
        winner = "🏆 " + name1 + " is better";
      } else if (sr2 > sr1) {
        winner = "🏆 " + name2 + " is better";
      } else {
        winner = "🤝 Both are equal";
      }

      document.getElementById("result").innerText =
        name1 + " SR: " + sr1.toFixed(2) + "\n" +
        name2 + " SR: " + sr2.toFixed(2) + "\n\n" +
        winner;

      // Fix chart reload issue
      if (chart) {
        chart.destroy();
      }

      let ctx = document.getElementById("chart").getContext("2d");

      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: [name1, name2],
          datasets: [{
            label: "Strike Rate",
            data: [sr1, sr2]
          }]
        }
      });
    }
  </script>

</body>
</html>
