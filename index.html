<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Analytics & Turf Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #38bdf8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #f1f5f9; color: var(--text-main); }

        /* Navigation */
        nav {
            background: var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        /* Turf Section Toggle */
        .match-day-banner {
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Turf Scorer (Hidden by default) */
        #turf-manager {
            display: none; /* Toggle this with JS */
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .score-display { font-size: 4rem; font-weight: 900; color: #fbbf24; text-align: center; }
        .turf-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .turf-btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--accent); color: var(--primary); }
        .btn-red { background: #ef4444; color: white; grid-column: span 2; }

        /* Analytics Dashboard Style */
        .section-title { font-size: 1.1rem; font-weight: 700; margin: 20px 0 10px; text-transform: uppercase; color: #64748b; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card h3 { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        .stat-card p { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .analysis-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            border-left: 5px solid var(--accent);
        }

        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CRICKET<span>LAB</span></div>
        <div style="font-size: 0.8rem;">V 2.0</div>
    </nav>

    <div class="match-day-banner" onclick="toggleTurf()">
        ⚡ OPEN LIVE TURF SCORER
    </div>

    <div class="container">
        
        <section id="turf-manager">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span id="team-name" style="color: var(--accent); font-weight: bold;">TEAM A BATTING</span>
                <button onclick="toggleTurf()" style="background: none; border: none; color: white; font-size: 1.5rem;">×</button>
            </div>
            
            <input type="number" id="target-input" placeholder="Set Target Score" oninput="updateScorer()">
            
            <div class="score-display" id="main-score">0 - 0</div>
            <p style="text-align: center; color: #94a3b8; margin-bottom: 15px;">Overs: <span id="overs">0.0</span></p>

            <div class="turf-controls">
                <button class="turf-btn btn-blue" onclick="add(1)">+1</button>
                <button class="turf-btn btn-blue" onclick="add(4)">4</button>
                <button class="turf-btn btn-blue" onclick="add(6)">6</button>
                <button class="turf-btn btn-red" onclick="wicket()">WICKET</button>
                <button class="turf-btn" style="background: #444; color: white;" onclick="resetMatch()">RESET</button>
            </div>
            
            <div id="target-msg" style="margin-top: 15px; text-align: center; color: #fbbf24; font-weight: bold;"></div>
        </section>

        <h2 class="section-title">Career Analytics</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Batting Avg</h3>
                <p>38.4</p>
            </div>
            <div class="stat-card">
                <h3>Strike Rate</h3>
                <p>142.1</p>
            </div>
            <div class="stat-card">
                <h3>High Score</h3>
                <p>84*</p>
            </div>
            <div class="stat-card">
                <h3>Wickets</h3>
                <p>12</p>
            </div>
        </div>

        <h2 class="section-title">Form Analysis</h2>
        <div class="analysis-card">
            <p><strong>Pro Tip:</strong> Your scoring rate in the last 5 turf matches has increased by 12% during the powerplay overs.</p>
        </div>

    </div>

    <script>
        let runs = 0, wickets = 0, balls = 0;

        function toggleTurf() {
            const section = document.getElementById('turf-manager');
            section.style.display = (section.style.display === 'block') ? 'none' : 'block';
        }

        function add(r) { runs += r; balls++; updateScorer(); }
        function wicket() { if(wickets < 10) wickets++; balls++; updateScorer(); }

        function updateScorer() {
            document.getElementById('main-score').innerText = runs + " - " + wickets;
            document.getElementById('overs').innerText = Math.floor(balls/6) + "." + (balls%6);
            
            let target = document.getElementById('target-input').value;
            if(target > 0) {
                let needed = target - runs;
                document.getElementById('target-msg').innerText = "NEED " + needed + " RUNS TO WIN";
            }
        }

        function resetMatch() {
            if(confirm("Reset live match?")) {
                runs = 0; wickets = 0; balls = 0;
                document.getElementById('target-input').value = '';
                document.getElementById('target-msg').innerText = '';
                updateScorer();
            }
        }
    </script>
</body>
</html>
